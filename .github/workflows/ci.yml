name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FFMPEG_REF: jellyfin
  RUST_TOOLCHAIN: stable
  CARGO_TERM_COLOR: always

jobs:
  # ─── Format check (fast, no FFmpeg needed) ─────────────────────
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # ─── Linux: full build + clippy + test ─────────────────────────
  linux:
    name: linux (build + clippy + test)
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v4

      - name: Resolve jellyfin-ffmpeg HEAD (for cache key)
        id: ffmpeg_head
        run: |
          set -euo pipefail
          sha=$(git ls-remote https://github.com/jellyfin/jellyfin-ffmpeg.git "refs/heads/${FFMPEG_REF}" | awk '{print $1}')
          if [ -z "$sha" ]; then
            sha=$(git ls-remote https://github.com/jellyfin/jellyfin-ffmpeg.git "refs/tags/${FFMPEG_REF}" | awk '{print $1}')
          fi
          [ -n "$sha" ] || { echo "Could not resolve FFMPEG_REF=$FFMPEG_REF"; exit 1; }
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "Resolved jellyfin-ffmpeg ${FFMPEG_REF} -> $sha"

      - name: Cache FFmpeg build (install/ + ffmpeg-src/ + third-party/)
        id: ffmpeg_cache
        uses: actions/cache@v4
        with:
          path: |
            install
            ffmpeg-src
            third-party
          key: linux-ffmpeg-${{ steps.ffmpeg_head.outputs.sha }}-${{ hashFiles('scripts/build-ffmpeg.sh', 'scripts/install-deps.sh', 'patches/local/**') }}

      - name: Install build dependencies
        if: steps.ffmpeg_cache.outputs.cache-hit != 'true'
        run: ./scripts/install-deps.sh

      - name: Build patched FFmpeg
        if: steps.ffmpeg_cache.outputs.cache-hit != 'true'
        run: |
          # Disable NVIDIA / AMF on CI (no GPU drivers / SDKs preinstalled,
          # and configure does not need them for our ffmpeg7_1 link surface).
          ./scripts/build-ffmpeg.sh --no-nvidia --no-amf

      - name: Verify FFmpeg artifacts
        run: |
          ls -la install/lib/pkgconfig/
          install/bin/ffmpeg -hide_banner -version | head -3 || true

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: cargo clippy
        env:
          FFMPEG_PKG_CONFIG_PATH: ${{ github.workspace }}/install/lib/pkgconfig
          FFMPEG_INCLUDE_DIR: ${{ github.workspace }}/install/include
          FFMPEG_DYN_DIR: ${{ github.workspace }}/install/lib
          LD_LIBRARY_PATH: ${{ github.workspace }}/install/lib
          PKG_CONFIG_PATH: ${{ github.workspace }}/install/lib/pkgconfig
        run: cargo clippy --lib --bins --tests -- -D warnings

      - name: cargo build
        env:
          FFMPEG_PKG_CONFIG_PATH: ${{ github.workspace }}/install/lib/pkgconfig
          FFMPEG_INCLUDE_DIR: ${{ github.workspace }}/install/include
          FFMPEG_DYN_DIR: ${{ github.workspace }}/install/lib
          LD_LIBRARY_PATH: ${{ github.workspace }}/install/lib
          PKG_CONFIG_PATH: ${{ github.workspace }}/install/lib/pkgconfig
        run: cargo build --lib --bins --tests

      - name: cargo test
        env:
          FFMPEG_PKG_CONFIG_PATH: ${{ github.workspace }}/install/lib/pkgconfig
          FFMPEG_INCLUDE_DIR: ${{ github.workspace }}/install/include
          FFMPEG_DYN_DIR: ${{ github.workspace }}/install/lib
          LD_LIBRARY_PATH: ${{ github.workspace }}/install/lib
          PKG_CONFIG_PATH: ${{ github.workspace }}/install/lib/pkgconfig
        run: cargo test --lib --bins

  # ─── macOS: full build + clippy + test ─────────────────────────
  macos:
    name: macos (build + clippy + test)
    runs-on: macos-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v4

      - name: Resolve jellyfin-ffmpeg HEAD (for cache key)
        id: ffmpeg_head
        run: |
          set -euo pipefail
          sha=$(git ls-remote https://github.com/jellyfin/jellyfin-ffmpeg.git "refs/heads/${FFMPEG_REF}" | awk '{print $1}')
          [ -n "$sha" ] || { echo "Could not resolve FFMPEG_REF=$FFMPEG_REF"; exit 1; }
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Cache FFmpeg build
        id: ffmpeg_cache
        uses: actions/cache@v4
        with:
          path: |
            install
            ffmpeg-src
            third-party
          key: macos-ffmpeg-${{ steps.ffmpeg_head.outputs.sha }}-${{ hashFiles('scripts/build-ffmpeg.sh', 'patches/local/**') }}

      - name: Install build dependencies (Homebrew)
        if: steps.ffmpeg_cache.outputs.cache-hit != 'true'
        run: |
          # Core toolchain
          brew update
          brew install \
            pkg-config nasm yasm meson ninja cmake \
            x264 x265 dav1d svt-av1 libvpx aom \
            opus libvorbis lame fdk-aac theora libsoxr \
            libass freetype fribidi harfbuzz fontconfig \
            libbluray webp zimg chromaprint srt openjpeg jpeg-xl

      - name: Build patched FFmpeg (macOS)
        if: steps.ffmpeg_cache.outputs.cache-hit != 'true'
        env:
          # Expose Homebrew pkg-config so build-ffmpeg.sh's append_if_pkg detects libs.
          PKG_CONFIG_PATH: /opt/homebrew/lib/pkgconfig:/usr/local/lib/pkgconfig
        run: |
          # macOS lacks libdrm/libva/libpulse/etc — build-ffmpeg.sh skips them via pkg-config.
          # We turn off NVIDIA + AMF (Linux-specific in our flow) and let configure
          # auto-detect remaining codecs via Homebrew pkg-config.
          ./scripts/build-ffmpeg.sh --no-nvidia --no-amf

      - name: Verify FFmpeg artifacts
        run: |
          ls -la install/lib/pkgconfig/
          DYLD_FALLBACK_LIBRARY_PATH="$PWD/install/lib" install/bin/ffmpeg -hide_banner -version | head -3 || true

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: cargo clippy
        env:
          FFMPEG_PKG_CONFIG_PATH: ${{ github.workspace }}/install/lib/pkgconfig
          FFMPEG_INCLUDE_DIR: ${{ github.workspace }}/install/include
          FFMPEG_DYN_DIR: ${{ github.workspace }}/install/lib
          DYLD_FALLBACK_LIBRARY_PATH: ${{ github.workspace }}/install/lib
          PKG_CONFIG_PATH: ${{ github.workspace }}/install/lib/pkgconfig
        run: cargo clippy --lib --bins --tests -- -D warnings

      - name: cargo build
        env:
          FFMPEG_PKG_CONFIG_PATH: ${{ github.workspace }}/install/lib/pkgconfig
          FFMPEG_INCLUDE_DIR: ${{ github.workspace }}/install/include
          FFMPEG_DYN_DIR: ${{ github.workspace }}/install/lib
          DYLD_FALLBACK_LIBRARY_PATH: ${{ github.workspace }}/install/lib
          PKG_CONFIG_PATH: ${{ github.workspace }}/install/lib/pkgconfig
        run: cargo build --lib --bins --tests

      - name: cargo test
        env:
          FFMPEG_PKG_CONFIG_PATH: ${{ github.workspace }}/install/lib/pkgconfig
          FFMPEG_INCLUDE_DIR: ${{ github.workspace }}/install/include
          FFMPEG_DYN_DIR: ${{ github.workspace }}/install/lib
          DYLD_FALLBACK_LIBRARY_PATH: ${{ github.workspace }}/install/lib
          PKG_CONFIG_PATH: ${{ github.workspace }}/install/lib/pkgconfig
        run: cargo test --lib --bins

  # ─── Windows: TODO — see docs/ci-windows-todo.md ───────────────
  #
  # Why disabled:
  #   - jellyfin-ffmpeg's Windows build is a 30+ msys2 PKGBUILD chain
  #     (clang64 toolchain, custom builds of x264/x265/dav1d/svt-av1/etc.
  #     all with their own jellyfin patches) — see
  #     .vendors/ffmpeg/src/msys2/ in the parent tokimo repo and
  #     .inspo/jellyfin-ffmpeg/.github/workflows/_meta_win_clang_portable.yaml
  #     for the reference pipeline. Reproducing it cleanly under
  #     msys2/setup-msys2 GH action is multi-day work and almost
  #     certainly needs several rounds of iteration on real CI.
  #   - The simpler "use mingw prebuilt deps + only rebuild ffmpeg" path
  #     is feasible but still requires a working clang64 cross-compile
  #     of FFmpeg with all 32 patches applied. Punted to a follow-up PR
  #     so we don't block Linux/macOS coverage.
  #
  # Acceptance for the eventual Windows job:
  #   1. Use msys2/setup-msys2@v2 with msystem: CLANG64
  #   2. pacman -S mingw-w64-clang-x86_64-{x264,x265,dav1d,...}
  #   3. Adapt scripts/build-ffmpeg.sh to a Windows path that
  #      runs configure under the msys2 shell with the same patches.
  #   4. cargo with rsmpeg link_system_ffmpeg pointing at install/.
  #
  # windows:
  #   name: windows (build + clippy + test)
  #   runs-on: windows-latest
  #   needs: fmt
  #   defaults:
  #     run:
  #       shell: msys2 {0}
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: msys2/setup-msys2@v2
  #       with:
  #         msystem: CLANG64
